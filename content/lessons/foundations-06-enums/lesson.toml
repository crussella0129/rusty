id = "foundations-06-enums"
title = "Enums and Pattern Matching"
track = "Foundations"
estimated_minutes = 20
starter_project = "starter"
solution_project = "solution"

[[concepts]]
id = "enums"
name = "Enums"
description = "Defining a type by enumerating its possible variants."

[[concepts]]
id = "pattern_matching"
name = "Pattern Matching"
description = "Using the `match` expression to run code based on which variant you have."

[[concepts]]
id = "option_type"
name = "The Option Enum"
description = "Handling missing data safely with `Some(T)` or `None` instead of Nulls."

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "Structs group data together (AND), but Enums let you say a value can be one of a few variants (OR). For example, a `TrafficLight` can be Red OR Yellow OR Green."

[[steps.blocks]]
kind = "prose"
text = "To handle enums, Rust gives us `match`, which is like an extremely powerful `switch` statement that forces you to handle every single variant."

[[steps]]
[steps.exercise]
kind = "predict_then_run"
code = """
enum TrafficLight {
    Red,
    Yellow,
    Green,
}

fn main() {
    let light = TrafficLight::Red;
    
    match light {
        TrafficLight::Red => println!("Stop!"),
        TrafficLight::Yellow => println!("Slow down!"),
        TrafficLight::Green => println!("Go!"),
    }
}
"""
question = "What will this match expression print?"
expected_output = "Stop!"
explanation = "Because `light` is `TrafficLight::Red`, the `match` block executes the first arm."

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "A big problem in many languages is the 'Null Reference Exception'. Rust doesn't have Nulls! Instead, it uses a built-in Enum called `Option<T>`."

[[steps.blocks]]
kind = "prose"
text = "If there is data, it's `Some(data)`. If there isn't, it's `None`. Because it's an enum, you MUST handle the `None` case when you use a `match`!"

[[steps]]
[steps.exercise]
kind = "faded"
prompt = "In `src/main.rs`, we are using `match` to print out a user's nickname if they have one. But the `match` is missing an arm for `None`. Add it to print 'No nickname'. Click Check!"
file_path = "src/main.rs"
check_command = "cargo run"
success_criterion = { kind = "cargo_run_output_matches", expected = "My nickname is: Rusty\nNo nickname" }

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "Enums can also hold data directly inside their variants, making them incredibly flexible."

[[steps]]
[steps.exercise]
kind = "open"
prompt = """
At the bottom of `src/main.rs`, we have a `Message` enum.

1. Add a new variant called `Echo` that holds a `String`. (e.g. `Echo(String)`)
2. Update the `main` function to create a variable `msg3` set to `Message::Echo(String::from("Hello!"))`.
3. The compiler will now complain that the `match msg` block isn't exhaustive! Fix the `match` by adding an arm for `Message::Echo(text)` that prints `Echo: {}` with the text.
"""
check_command = "cargo run"
success_criterion = { kind = "cargo_run_output_matches", expected = "My nickname is: Rusty\nNo nickname\nQuitting...\nMoving to x: 10, y: 20\nEcho: Hello!" }

[recall_prompt]
kind = "multiple_choice"
question = "Why is using `match` with an Enum safer than a chain of `if/else` statements?"
choices = [
    "Because `match` runs much faster in memory.",
    "Because the compiler enforces exhaustiveness, meaning you can't forget to handle a variant.",
    "Because `match` is the only way to return a value in Rust."
]
answer_index = 1
explanation = "The compiler checks that every single enum variant is accounted for. If you add a new variant later, your code will safely fail to compile until you update your `match` blocks!"

[[further_reading]]
title = "Enums and Pattern Matching - The Rust Book"
url = "https://doc.rust-lang.org/book/ch06-00-enums.html"
