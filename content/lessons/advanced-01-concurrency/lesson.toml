# STEP 5: Outro
# ----------------------------------------------------------------------------------
[[steps]]

[[steps.blocks]]
kind = "prose"
text = """
Congratulations! You just wrote multi-threaded code without a single data race!

Rust's strict ownership rules naturally extend to concurrency. If your concurrent code compiles, it's generally free of data races. This is why Rust's concurrency is known as **Fearless Concurrency**.

Next up, we'll dive into `async`/`await` and the `tokio` runtime to write high-performance asynchronous servers!
"""

[recall_prompt]
kind = "multiple_choice"
question = "Why do we typically use the `move` keyword when spawning a thread?"
choices = [
    "To make the thread run faster.",
    "To force the thread closure to take ownership of the variables it uses.",
    "To move the thread to a different CPU core.",
    "To send a message over a channel."
]
answer_index = 1
explanation = "Threads might outlive their parent, so they cannot safely borrow local variables. `move` forces them to take ownership."
