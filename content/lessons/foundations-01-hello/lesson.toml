id = "foundations-01-hello"
title = "Hello, compiler."
track = "Foundations"
prereqs = []
estimated_minutes = 12
starter_project = "starter"
solution_project = "solution"

[[concepts]]
id = "cargo-run-builds-and-runs"
claim = "`cargo run` compiles your crate and then runs the resulting binary."
why_it_matters = "It is the one command that turns source text into a running program, so it is the heartbeat of every edit–build–run loop."
common_misconception = "That `cargo run` only launches an already-built binary — it rebuilds first whenever anything changed."

[[concepts]]
id = "compiler-is-a-conversation"
claim = "`rustc`'s errors are precise, located, and usually point at the fix."
why_it_matters = "Reading the real error text — not a paraphrase — is the fastest way to learn Rust."
common_misconception = "That a wall of compiler output means everything is broken; it is usually one root cause wrapped in helpful context."

[[concepts]]
id = "main-is-the-entry-point"
claim = "Execution starts at `fn main()`."
why_it_matters = "Every runnable Rust program needs exactly one `main` — it is where your program begins."

[[body]]
kind = "prose"
text = """
Welcome. Before we talk *about* Rust, let's run some. The terminal on the right is a
real shell sitting inside this lesson's project folder — the same `cargo` you would
use on any Rust project.

Your first job is a single command. When you run it, `cargo` will **compile** the
project and then **execute** it. The first compile is slow because Rust does a lot of
checking up front; later runs are fast.
"""

[[body]]
kind = "code"
lang = "rust"
source = """
fn main() {
    println!("Welcome — Rusty is compiling your first program.");
}
"""

[[body]]
kind = "now_run"
command = "cargo run"
note = "Watch the compile messages scroll, then find the printed line at the end."

[[body]]
kind = "callout"
tone = "tip"
text = "Only want to know if it *compiles*, without running it? Try `cargo check` — it skips code generation, so it is faster."

[[body]]
kind = "prose"
text = """
See that final line? You just compiled and ran a Rust program. Everything else in
this track builds on that loop: change the source, run it, and read what the compiler
tells you.
"""

# --- Exercises (prompt §3: at least one each of Worked / Faded / Open, plus a
# PredictThenRun). Worked and PredictThenRun are read/think; Faded and Open are graded
# in-app by the Check button against the lesson sandbox. ---

[[exercises]]
kind = "worked"
prompt = "Here is the smallest complete Rust program. `fn main()` is where every program starts, and `println!` prints a line to the terminal."
code = '''
fn main() {
    println!("Hello, compiler.");
}
'''
annotation = "`println!` is a macro (the `!` gives it away), and the text in quotes is what gets printed. You run a program like this with `cargo run`."

[[exercises]]
kind = "predict_then_run"
code = '''
fn main() {
    let n = 1 + 2;
    println!("{n}");
}
'''
question = "Before running this, predict: what single line will it print?"
expected_output = "3"
explanation = 'Rust evaluates `1 + 2` to `3`, and `println!("{n}")` prints the value of `n` followed by a newline.'

[[exercises]]
kind = "faded"
prompt = """
The project's test calls a function `greeting()` that does not exist yet. Press **Check** (or run `cargo test`) and read the error Rusty shows you — that is error E0425, "cannot find function". Then define `greeting` in `src/main.rs` so it returns the String \"Hello, Rusty!\", and Check again.
"""
file_path = "src/main.rs"
check_command = "cargo test"
success_criterion = { kind = "cargo_test_passes" }

[[exercises]]
kind = "open"
prompt = """
Make the program announce itself. Edit `src/main.rs` so that `cargo run` prints exactly this line, then press **Check**:

    I compiled my first Rust program!
"""
check_command = "cargo run"
success_criterion = { kind = "cargo_run_output_matches", expected = "I compiled my first Rust program!" }

[recall_prompt]
kind = "multiple_choice"
question = "What does `cargo run` actually do?"
choices = [
    "Runs a previously built binary without recompiling",
    "Compiles the crate (if needed) and then runs the resulting binary",
    "Only checks the code for errors without producing a binary",
]
answer_index = 1
explanation = "`cargo run` rebuilds whatever changed, then executes the binary. `cargo check` only checks; `cargo build` compiles without running."

[[further_reading]]
title = "The Rust Programming Language — Hello, Cargo!"
url = "https://doc.rust-lang.org/book/ch01-03-hello-cargo.html"
note = "The Book's take on the same edit–build–run loop."
