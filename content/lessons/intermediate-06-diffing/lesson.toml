id = "intermediate-06-diffing"
title = "Advanced Diffing Climax"
track = "Intermediate"
estimated_minutes = 45
starter_project = "starter"
solution_project = "solution"
prereqs = ["intermediate-05-parsing"]

[[concepts]]
id = "dynamic-programming"
name = "Dynamic Programming"
description = "An algorithmic technique that solves a complex problem by breaking it down into a collection of simpler subproblems, solving each of those subproblems just once, and storing their solutions."

[[concepts]]
id = "lcs"
name = "Longest Common Subsequence (LCS)"
description = "The longest sequence of characters that appear in the same relative order in two different strings. It forms the basis of many diffing algorithms."

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "Welcome to the final lesson of the Intermediate Track! Here, you'll build a character-by-character diffing algorithm."

[[steps.blocks]]
kind = "prose"
text = "When we compare two strings (e.g., \"kitten\" and \"sitting\"), we want to know what to keep, what to insert, and what to delete. We can model this with an Enum."

[[steps]]
[steps.exercise]
kind = "predict_then_run"
code = """#[derive(Debug, PartialEq)]
enum Diff {
    Keep(char),
    Insert(char),
    Delete(char),
}

fn main() {
    let diffs = vec![
        Diff::Delete('a'),
        Diff::Keep('b'),
        Diff::Insert('c'),
    ];
    println!("{:?}", diffs[0]);
}"""
question = "What will this program output?"
expected_output = "Delete('a')"
explanation = "Enums with data behave like normal values, and their `Debug` representation shows both the variant name and the enclosed data."

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "To figure out the edits, we first find the lengths of the Longest Common Subsequences for every prefix of the two strings. We do this by building a 2D grid (a matrix) of sizes `(a.len() + 1) x (b.len() + 1)`."

[[steps]]
[steps.exercise]
kind = "faded"
prompt = "In `src/main.rs`, complete the `lcs_matrix` function. If the characters match, add 1 to the top-left diagonal cell. Otherwise, take the maximum of the top cell and the left cell. Run Check when you're done!"
file_path = "src/main.rs"
check_command = "cargo test test_lcs_matrix"
success_criterion = { kind = "cargo_test_passes" }
hint = "Use `matrix[i][j] = matrix[i - 1][j - 1] + 1;` when they match, and `matrix[i][j] = std::cmp::max(matrix[i - 1][j], matrix[i][j - 1]);` when they don't."

[[steps]]
[[steps.blocks]]
kind = "prose"
text = "Excellent! Now that we have the LCS matrix, we can trace backwards from the bottom-right corner to the top-left corner to determine the edit script."

[[steps]]
[steps.exercise]
kind = "open"
prompt = "In `src/main.rs`, implement `compute_diff` using the matrix generated by `lcs_matrix`. Loop while `i > 0` or `j > 0` and push the corresponding `Diff` variant. Reverse the vector at the end. Uncomment the test and run Check when done!"
check_command = "cargo test test_compute_diff"
success_criterion = { kind = "cargo_test_passes" }

[recall_prompt]
kind = "multiple_choice"
question = "Why do we use Dynamic Programming (the 2D matrix) for the LCS problem instead of a simple recursive approach?"
choices = [
    "Because Rust does not support recursion.",
    "Because a simple recursive approach would recalculate the same subproblems many times, making it extremely slow.",
    "Because 2D matrices use less memory than recursion.",
    "Because Enums require Dynamic Programming to be instantiated."
]
answer_index = 1
explanation = "Without memoization or a bottom-up DP table, the recursive LCS algorithm has an exponential time complexity due to solving the same overlapping subproblems repeatedly."

[[further_reading]]
title = "Longest Common Subsequence on Wikipedia"
url = "https://en.wikipedia.org/wiki/Longest_common_subsequence_problem"
