[recall_prompt]
kind = "multiple_choice"
question = "Why does Rust's `Iterator` trait use an associated type (`type Item`) instead of a generic parameter (`trait Iterator<T>`)?"
choices = [
    "Because generics are slower at runtime.",
    "Because associated types prevent a struct from implementing the trait multiple times for different types.",
    "Because associated types are required for the `Drop` trait.",
    "Because it saves memory."
]
answer_index = 1
explanation = "Associated types guarantee there is exactly one implementation of the trait per struct, avoiding ambiguity when calling `.next()`."
