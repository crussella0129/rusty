<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Body/Chest -->
  <path d="M 35,100 C 35,80 85,80 85,100 Z" fill="#FF9F1C" />
  <!-- Happy Tail -->
  <path d="M 85,90 C 95,80 105,60 108,62 C 110,65 98,90 85,95 Z" fill="#FF9F1C" />
  <!-- Red Collar -->
  <path d="M 40,88 C 40,84 80,84 80,88 Z" fill="#E71D36" />
  <!-- Gold Tag -->
  <circle cx="60" cy="94" r="6" fill="#FFD700" />
  
  <!-- Left Ear (happy, slightly perked/outwards) -->
  <path d="M 25,38 C 5,30 5,65 20,68 C 28,68 30,52 28,38 Z" fill="#E58E1A" />
  <!-- Right Ear (happy, slightly perked/outwards) -->
  <path d="M 95,38 C 115,30 115,65 100,68 C 92,68 90,52 92,38 Z" fill="#E58E1A" />
  
  <!-- Head Base -->
  <circle cx="60" cy="55" r="30" fill="#FF9F1C" />
  
  <!-- Snout -->
  <path d="M 45,62 C 45,55 75,55 75,62 C 75,70 45,70 45,62 Z" fill="#FFBF69" />
  <!-- Tongue -->
  <path d="M 54,64 C 54,75 66,75 66,64 Z" fill="#FF9999" />
  <!-- Nose -->
  <path d="M 55,60 C 55,57 65,57 65,60 Q 65,64 55,60 Z" fill="#1E2022" />
  
  <!-- Happy Closed Eyes (smiling) -->
  <path d="M 44,50 Q 48,44 52,50" stroke="#1E2022" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 68,50 Q 72,44 76,50" stroke="#1E2022" stroke-width="3" fill="none" stroke-linecap="round" />
</svg>
